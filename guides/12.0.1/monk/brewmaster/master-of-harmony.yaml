specId: 268
className: Monk
specName: Brewmaster
role: Tank
patch: 12.0.1
guideVersion: 3
heroTalent: Master of Harmony
resourceManagement:
  primaryResource: Energy
  secondaryResource: Vitality / Stagger
  resourceNotes: Energy is spent on Keg Smash and Tiger Palm to reduce Brew cooldowns. Stagger delays damage into a DoT. Vitality
    is accumulated from damage/healing and spent via Celestial Brew or Celestial Infusion to trigger Aspect of Harmony.
maintenanceBuffs:
- spellId: 0
  spellName: Shuffle
  targetUptimePct: 95
  importance: critical
  coachingTip: 'Maintain 100% uptime by using Blackout Kick and Keg Smash. Shuffle is essential for Stagger effectiveness.'
- spellId: 0
  spellName: Charred Passions
  targetUptimePct: 90
  importance: high
  coachingTip: Triggered by Breath of Fire. Enhances Blackout Kick and Spinning Crane Kick.
- spellId: 0
  spellName: Aspect of Harmony
  targetUptimePct: 70
  importance: high
  coachingTip: Triggered by spending Vitality via Celestial Brew or Celestial Infusion. Increases damage and healing.
tankingGuide:
  survivalPriority: |-
    These abilities take absolute priority over the damage rotation below.
    1. Maintain Shuffle at 100% uptime. Shuffle is essential for Stagger effectiveness.
       Generated by Blackout Kick, Keg Smash, and Spinning Crane Kick. If Shuffle drops, Stagger
       becomes ineffective and you will take massive spike damage.
    2. Use Purifying Brew when Stagger is high (red Stagger). Clears 50% of current Stagger.
       Never sit on 2 charges — use one if the second is about to cap. Save one charge for damage spikes.
    3. Use Celestial Brew / Celestial Infusion for absorb shields. For Master of Harmony, this also
       triggers Aspect of Harmony (increased damage and healing) and grants Empty Barrel charges
       via Bring Me Another. Balance defensive and offensive use.
    4. Collect Healing Spheres (Gift of the Ox) with Expel Harm when low on health.
       One sphere spawns per 100% max HP taken as damage.
  defensiveCooldowns: |-
    - Fortifying Brew (4-6min): Major defensive. Increases health and reduces damage taken. CD reduced
      by Tiger Palm and Keg Smash. Use for dangerous pulls or tank busters.
    - Celestial Brew / Celestial Infusion (1min): Defensive absorb shield. Also triggers Aspect of
      Harmony and Empty Barrel for Master of Harmony. Use proactively — don't hold charges.
    - Black Ox Brew (2min): Resets Celestial Brew and Purifying Brew charges + restores Energy.
      Use when you need immediate access to defensive brews.
    - Invoke Niuzao, the Black Ox (3min): Hybrid offensive/defensive. Stomp triggered by Blackout Kick.
      Purifying Brew heals Niuzao.
  staggerManagement: |-
    Stagger is the core Brewmaster mechanic. It converts incoming damage into a 10-15s DoT, smoothing
    damage intake. Shuffle increases Stagger effectiveness — without it, Stagger barely works.
    Purifying Brew is required to actually REDUCE the delayed damage. Monitor your Stagger bar color:
    green (low) = safe, yellow (medium) = consider purifying, red (high) = purify immediately.
    Mastery (Elusive Brawler) increases dodge chance each time you are hit or use Blackout Kick,
    resetting on dodge. This provides additional passive mitigation.

removedMechanics:
- Rising Sun Kick (removed in 12.0)
- Weapons of Order (removed in 12.0)
- Clash (removed in 12.0)
- Dampen Harm (removed in 12.0)
- Diffuse Magic (reworked into passive enhancement for Fortifying Brew)
- Hit Scheme (removed in 12.0)
rotation:
  singleTarget: |
    1. Activate Black Ox Brew if it won't waste Energy or Brew charges.
    2. Use Touch of Death on targets below your max HP or 15% HP.
    3. Use Blackout Kick to trigger Blackout Combo.
    4. Cast Chi Burst.
    5. Activate Celestial Brew or Celestial Infusion if taking minimal damage to gain an Empty Barrel from Bring Me Another.
    6. Activate Celestial Brew or Celestial Infusion if at two charges or vitality is full to trigger Harmonic Surge and gain an Empty Barrel.
    7. Trigger Invoke Niuzao, the Black Ox if the fight will last at least 25 seconds.
    8. Consume Blackout Combo buff with Tiger Palm to spend a stack of Harmonic Surge.
    9. Use a charge of Keg Smash or an active Empty Barrel from Bring Me Another.
    10. Use Keg Smash if an Empty Barrel is active to trigger Potential Energy and drain vitality for bonus damage.
    11. Use Breath of Fire to maintain the Charred Passions buff.
    12. Throw Exploding Keg (ideally with Rushing Jade Wind active) to reset a Keg Smash charge.
    13. Use a spare charge of Purifying Brew if taking low damage to proc Special Delivery or Bring Me Another.
    14. Reactivate Rushing Jade Wind.
    15. Use Tiger Palm as filler if you have excess Energy for the next Keg Smash.
    16. Use Spinning Crane Kick as filler if you have excess Energy for the next Keg Smash.
  aoe: |
    1. Activate Black Ox Brew.
    2. Use Touch of Death.
    3. Use Blackout Kick to trigger Blackout Combo.
    4. Cast Chi Burst.
    5. Activate Celestial Brew or Celestial Infusion to gain an Empty Barrel.
    6. Activate Celestial Brew or Celestial Infusion if at two charges or vitality is full for Harmonic Surge.
    7. Trigger Invoke Niuzao, the Black Ox.
    8. Consume Blackout Combo buff with Tiger Palm to spend Harmonic Surge.
    9. Use Keg Smash or an active Empty Barrel.
    10. Use Keg Smash with an active Empty Barrel to trigger Potential Energy and drain vitality.
    11. Use Breath of Fire to maintain Charred Passions.
    12. Throw Exploding Keg.
    13. Use a spare charge of Purifying Brew.
    14. Reactivate Rushing Jade Wind.
    15. Use Spinning Crane Kick if fighting 3+ enemies and Energy is available for the next Keg Smash.
  opener: |
    1. Use Breath of Fire 3 seconds before combat for Charred Passions.
    2. Activate Rushing Jade Wind 1-2 seconds before combat.
    3. Use Chi Burst 1 second before combat while moving to the target.
    4. Use Keg Smash on pull (optionally Provoke).
    5. Use Blackout Kick.
    6. Use Breath of Fire.
    7. Use Tiger Palm.
    8. Use Exploding Keg or Invoke Niuzao.
    9. Use Keg Smash.
    10. Use Blackout Kick.
    11. Activate Invoke Niuzao or Exploding Keg.
cooldowns:
- name: Exploding Keg
  cooldown: 1m
  description: 'Deals massive burst Fire damage and resets one charge of Keg Smash. Causes enemy auto-attacks to deal only
    1 damage for a few seconds.'
- name: Invoke Niuzao, the Black Ox
  cooldown: 3m
  description: Summons Niuzao to deal damage via Stomp (triggered by Blackout Kick). Purifying Brew heals Niuzao to offset
    Stagger damage he takes for you.
- name: Touch of Death
  cooldown: 1.5min
  description: 'Execute ability. Instantly kills targets with less health than you, or deals 35% of your max HP to targets
    below 15% health.'
- name: Fortifying Brew
  cooldown: '4-6min'
  description: Major defensive. Increases health and reduces damage taken. Cooldown reduced by Tiger Palm and Keg Smash.
- name: Celestial Brew / Celestial Infusion
  cooldown: 1min
  description: Defensive absorb shield. Brew charges are reduced by other Brew uses. Conduit players use this to trigger Aspect
    of Harmony and gain Empty Barrel via Bring Me Another.
- name: Purifying Brew
  cooldown: 20s recharge
  description: 'Clears 50% of current Stagger. Use proactively when Stagger is high.'
- name: Black Ox Brew
  cooldown: 2min
  description: Instantly resets Celestial Brew and Purifying Brew charges. Also restores Energy.
concepts:
- 'Aspect of Harmony (Conduit): Vitality accumulates from damage dealt and healing received. Spending Vitality via Celestial
  Brew or Celestial Infusion triggers Aspect of Harmony, increasing your damage and healing.'
- 'Harmonic Surge (Conduit): Triggered when Celestial Brew/Infusion is used at two charges or full Vitality. Empowers your
  next Tiger Palm to deal bonus damage.'
- 'Empty Barrel (Conduit): Gained from Bring Me Another when using Celestial Brew/Infusion. Provides an extra Keg Smash charge
  that triggers Potential Energy for bonus damage.'
- 'Blackout Combo: Blackout Kick empowers your next ability. Tiger Palm is the primary consumer for the Combo buff.'
- 'Charred Passions: Breath of Fire applies this buff, empowering Blackout Kick and Spinning Crane Kick damage.'
- 'Invoke Niuzao: Summons the Black Ox. Stomp is triggered by Blackout Kick. Purifying Brew heals Niuzao.'
commonMistakes:
- 'Letting Shuffle drop below 100% uptime, drastically reducing Stagger effectiveness.'
- Overcapping Celestial Brew charges instead of using them to trigger Aspect of Harmony.
- Ignoring Vitality management — not spending full Vitality via Celestial Brew for maximum Harmonic Surge benefit.
- Forgetting to consume Blackout Combo with Tiger Palm before using other abilities.
- Not maintaining Charred Passions by casting Breath of Fire regularly.
- Holding Purifying Brew too long when Stagger is dangerously high.
patchChanges:
  12.0.1: 'Rising Sun Kick removed from Brewmaster. Weapons of Order removed. Clash removed. Dampen Harm removed; Diffuse
    Magic reworked into passive Fortifying Brew enhancement. Conduit of the Celestials reworked: Aspect of Harmony now triggered
    by spending Vitality via Celestial Brew/Infusion. Bring Me Another talent added, granting Empty Barrel charges from Celestial
    Brew/Infusion usage.'
