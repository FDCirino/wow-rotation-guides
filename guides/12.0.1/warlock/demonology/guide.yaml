    spellName: Doom
    targetUptimePct: 95
    importance: high
    coachingTip: 'Doom deals damage when it expires or the target dies. Hand of Gul''dan reduces its duration by 3s. In single target, hold one Demonic Core charge to reapply Doom once it expires.'

