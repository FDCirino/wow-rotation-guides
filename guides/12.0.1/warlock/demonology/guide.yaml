guideVersion: 2

resourceManagement:
  primaryResource: Soul Shards
  secondaryResource: Demonic Core
  resourceNotes: 'Soul Shards are the primary resource (max 5). Generate them with Shadow Bolt and Demonbolt; spend them on Call Dreadstalkers and Hand of Gul''dan (which now always costs 3 shards). Demonic Core is a secondary resource (max 4 stacks) that makes Demonbolt instant and generate more shards. Overcapping shards or cores is a significant DPS loss. Always ensure you have 2 shards ready for Call Dreadstalkers on cooldown.'

