specId: 266
className: Warlock
specName: Demonology
role: DPS
heroTalent: Soul Harvester
patch: 12.0.1
guideVersion: 3
resourceManagement:
  primaryResource: Soul Shards
  secondaryResource: Demonic Core
  resourceNotes: 'Generate Soul Shards using Shadow Bolt and Demonbolt. Spend Shards on Hand of Gul''dan and Call Dreadstalkers.
    Soul Harvester gameplay focuses on aggressive shard spending to trigger DoT effects and generate additional Demonic Core
    procs via Sataiel''s Volition.'
maintenanceBuffs:
- spellId: 0
  spellName: Doom
  targetUptimePct: 95
  importance: high
  coachingTip: 'Maintain Doom on your primary target. Each Hand of Gul''dan cast reduces its duration by 3 seconds, so be
    ready to reapply via Demonbolt when it expires.'
- spellId: 0
  spellName: Shared Vessel
  targetUptimePct: 100
  importance: medium
  coachingTip: This passive increases your Mastery; the bonus is doubled when Demonic Soul triggers.
- spellId: 0
  spellName: Soul Leech
  targetUptimePct: 100
  importance: medium
  coachingTip: Buffer your health pool with this overshield generated by your damage.
rotation:
  singleTarget: |
    1. Cast Grimoire: Imp Lord.
    2. Cast Grimoire: Fel Ravager.
    3. Cast Summon Demonic Tyrant.
    4. Cast Summon Doomguard.
    5. Cast Power Siphon with 2 or less Demonic Core and at least 2 Wild Imps out.
    6. Cast Implosion with 6 Wild Imps out (if talented into To Hell and Back).
    7. Cast Call Dreadstalkers whenever available.
    8. Cast Hand of Gul'dan if you have 4-5 Soul Shards.
    9. Cast Demonbolt if you have 2+ stacks of Demonic Core.
    10. Cast Infernal Bolt when at 2 or less Soul Shards.
    11. Cast Shadow Bolt to generate Soul Shards.
  aoe: |
    1. Cast Grimoire: Imp Lord.
    2. Cast Grimoire: Fel Ravager.
    3. Cast Summon Demonic Tyrant.
    4. Cast Summon Doomguard.
    5. Cast Power Siphon with 2 or less Demonic Core and at least 2 Wild Imps out.
    6. Cast Implosion with 6 Wild Imps out.
    7. Cast Call Dreadstalkers whenever available.
    8. Cast Hand of Gul'dan if you have 4-5 Soul Shards.
    9. Cast Demonbolt if you have 2+ stacks of Demonic Core.
    10. Cast Infernal Bolt when at 2 or less Soul Shards.
    11. Cast Shadow Bolt to generate Soul Shards.
  opener: |
    1. Pre-cast Demonbolt.
    2. Pre-cast Demonbolt.
    3. Pre-cast Power Siphon with 2 Wild Imps out.
    4. Pre-cast Shadow Bolt.
    5. Cast Shadow Bolt.
    6. Cast Summon Doomguard.
    7. Cast Grimoire: Imp Lord.
    8. Cast Grimoire: Fel Ravager.
    9. Cast Shadow Bolt.
    10. Cast Shadow Bolt.
    11. Cast Shadow Bolt.
    12. Cast Shadow Bolt if below 2 Soul Shards.
    13. Cast Call Dreadstalkers.
    14. Cast Summon Demonic Tyrant.
    15. Focus on casting as many Hand of Gul'dan possible.
    16. Cast Implosion with 6 Wild Imps out and 1 or less Demonic Core.
    17. Cast Power Siphon after the second Hand of Gul'dan.
cooldowns:
- name: Summon Demonic Tyrant
  cooldown: 2min
  description: Main cooldown. Lasts 20s; damage scales dynamically based on active Wild Imps and Dreadstalkers.
- name: Summon Doomguard
  cooldown: Variable
  description: Cooldown is dynamically reduced when spending Demonic Cores.
- name: 'Grimoire: Imp Lord / Fel Ravager'
  cooldown: 1min
  description: Choice node providing extra utility (Singe Magic or Spell Lock) and significant damage.
- name: Call Dreadstalkers
  cooldown: 20s
  description: Core rotational summon; now also triggers Summon Vilefiend effects if talented.
- name: Dark Pact
  cooldown: 1min
  description: Primary active mitigation; use frequently to buffer damage.
concepts:
- 'Soul Harvester Identity: Revolves around aggressive shard spending to trigger DoT effects and generate Demonic Core procs
  via Sataiel''s Volition.'
- 'Sataiel''s Volition: A key Hero Talent that increases Demonic Core generation, feeding the shard-spending loop.'
- 'Manifested Avarice: Consuming Succulent Souls has a chance to trigger Soul Swipe, dealing AoE damage within 10 yards.'
- 'Dominion of Argus: This Apex talent shifts the rotation from a pre-Tyrant setup to a post-Tyrant sequence focused on maximizing
  Hand of Gul''dan casts.'
- 'Doom Management: Doom deals damage when the target dies or the duration ends. In single target, Hand of Gul''dan reduces
  its duration; in AoE, apply to multiple targets (especially low health ones) via Demonbolt.'
- 'Implosion Mechanics: Damage is proportional to the remaining energy of Wild Imps. With "To Hell and Back," it is worth'
- 'Always-Be-Casting: Demonology depends on continuous casting for shard flow and demon uptime.'
- 'Pet Choice: Always use the Felguard. Axe Toss provides a stun and interrupt.'
- 'Movement: Use instant Demonbolt procs to cover movement. Use Demonic Gateway and Circle.'
- 'Demonic Core Management: Max 4 stacks. Pool at least 2 stacks before Summon Demonic Tyrant to quickly generate shards for
  Hand of Gul''dan spam.'
- 'Movement: Use Demonbolt strategically to cover movement windows as it is your only instant-cast shard generator.'
commonMistakes:
- 'Overcapping Soul Shards (max 5) instead of spending them on Hand of Gul''''dan'
- Overcapping Demonic Core stacks (max 4) and wasting procs
- Not using Implosion in single target when talented into To Hell and Back
- Holding defensive cooldowns like Dark Pact or Unending Resolve for too long
- 'Failing to strafe during movement, causing Wild Imps to wide-spread and ninja-pull extra packs'
- Not pooling resources (Shards/Cores) before the Summon Demonic Tyrant window
patchChanges:
  12.0.1: 'Soul Harvester: Added Manifested Avarice (Soul Swipe), Shared Vessel (Mastery), and Eternal Hunger.'
  '12.0': 'Hand of Gul''dan now costs exactly 3 Soul Shards. Summon Vilefiend is now attached to Summon Dreadstalkers. Summon
    Demonic Tyrant damage now scales dynamically (no snapshotting). Removed: Soul Strike, Demonic Strength, Bilescourge Bombers,
    and Grimoire: Felguard. New Choice Node: Grimoire: Imp Lord and Grimoire: Fel Ravager.'
