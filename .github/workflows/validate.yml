name: Validate Guides

on:
  pull_request:
    paths:
      - 'guides/**'
  push:
    branches: [main]
    paths:
      - 'guides/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate all guides
        run: python scripts/validate.py
